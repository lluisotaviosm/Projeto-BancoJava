# Configurações do Banco de Dados SQLite
spring.datasource.url=jdbc:sqlite:banco.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Configurações do JPA e Hibernate
# No Spring Boot 3 / Hibernate 6, o SQLite é suportado nativamente pelo Community Dialects
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Exibe o SQL no console para fins de debug (opcional)
spring.jpa.show-sql=true

# Porta do Servidor (opcional)
server.port=8080
